name: xhblogs

services:
  mysql:
    image: mysql:8.0
    container_name: xhblogs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xhblogs}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/migrations/init_mysql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  # MySQL 就绪后建库、建表（CREATE IF NOT EXISTS，可重复执行）
  db-init:
    image: mysql:8.0
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_PWD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - ./scripts/migrations/init_mysql.sql:/init.sql:ro
    entrypoint: ["sh", "-ec"]
    command:
      - |
        echo "Ensuring database and tables..."
        mysql -h mysql -uroot --default-character-set=utf8mb4 < /init.sql
        echo "Schema ready."
    restart: "no"

  cms-api:
    build:
      context: ./my-blog-manager
      dockerfile: Dockerfile.api
    container_name: xhblogs-cms-api
    restart: unless-stopped
    ports:
      - "${CMS_API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  xhblogs:
    build:
      context: ./XHBlogs
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: xhblogs-web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config/netease_private_key.pem:/app/config/netease_private_key.pem:ro
    ports:
      - "${XHBLOGS_PORT:-3000}:3000"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-xhblogs}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xhblogs}
      NETEASE_PRIVATE_KEY_PATH: /app/config/netease_private_key.pem
    depends_on:
      mysql:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  blog-manager:
    build:
      context: ./my-blog-manager
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: xhblogs-manager
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config/netease_private_key.pem:/app/config/netease_private_key.pem:ro
    ports:
      - "${MANAGER_PORT:-3001}:3000"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-xhblogs}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xhblogs}
      CMS_API_PORT: ${CMS_API_PORT:-8000}
      NETEASE_PRIVATE_KEY_PATH: /app/config/netease_private_key.pem
      BLOG_MANAGER_PUBLIC_URL: ${BLOG_MANAGER_PUBLIC_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      cms-api:
        condition: service_started

volumes:
  mysql_data:
